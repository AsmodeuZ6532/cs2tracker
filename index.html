<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>FACEIT TRACKER PRO</title>
    <style>
        /* ============================================
           ПЕРЕМЕННЫЕ ДЛЯ ТЕМ
           ============================================ */
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1E1E1E;
            --bg-card: #1E1E1E;
            --bg-input: #2a2a2a;
            --bg-hover: #262626;
            --text-primary: #ffffff;
            --text-secondary: #aaa;
            --text-muted: #888;
            --border-color: #333;
            --shadow-color: rgba(0,0,0,0.6);
            --orange: #FF5500;
            --orange-hover: #e04a00;
            --scrollbar-track: #1E1E1E;
            --scrollbar-thumb: #FF5500;
            --badge-win-bg: #1e7e34;
            --badge-win-text: #b7f0c0;
            --badge-loss-bg: #7e1e1e;
            --badge-loss-text: #f0b7b7;
            --filter-bg: #2a2a2a;
            --filter-hover: #3a3a3a;
            --rank-hover: #2a2a2a;
            --goal-bg: #252525;
            --chart-bg: #1E1E1E;
            --table-border: #2a2a2a;
            --table-row-hover: #262626;
        }

        /* ============================================
           СВЕТЛАЯ ТЕМА
           ============================================ */
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f0f0;
            --bg-hover: #f0f0f0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-muted: #888;
            --border-color: #ddd;
            --shadow-color: rgba(0,0,0,0.1);
            --orange: #FF5500;
            --orange-hover: #e04a00;
            --scrollbar-track: #e0e0e0;
            --scrollbar-thumb: #FF5500;
            --badge-win-bg: #d4edda;
            --badge-win-text: #155724;
            --badge-loss-bg: #f8d7da;
            --badge-loss-text: #721c24;
            --filter-bg: #e8e8e8;
            --filter-hover: #d0d0d0;
            --rank-hover: #f0f0f0;
            --goal-bg: #f0f0f0;
            --chart-bg: #ffffff;
            --table-border: #e0e0e0;
            --table-row-hover: #f5f5f5;
        }

        /* ============================================
           БАЗОВЫЕ СТИЛИ
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .app {
            max-width: 1400px;
            width: 100%;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        /* ============================================
           ШАПКА
           ============================================ */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .app-header h1 {
            display: flex;
            gap: 12px;
            align-items: center;
            color: var(--text-primary);
        }

        .app-header h1 span {
            background: var(--orange);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 1.2rem;
            color: #fff;
        }

        .user-display {
            color: var(--orange);
            font-weight: 600;
            font-size: 1.1rem;
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 30px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            border-color: var(--orange);
            transform: scale(1.05);
        }

        /* ============================================
           ВКЛАДКИ
           ============================================ */
        .tab-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--orange);
            color: #fff;
        }

        .tab-btn:hover {
            background: var(--orange);
            color: #fff;
        }

        .hidden {
            display: none;
        }

        /* ============================================
           БЭЙДЖИ
           ============================================ */
        .badge-win {
            background: var(--badge-win-bg);
            color: var(--badge-win-text);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-loss {
            background: var(--badge-loss-bg);
            color: var(--badge-loss-text);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .orange {
            color: var(--orange);
        }

        /* ============================================
           КАРТОЧКИ
           ============================================ */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            border-left: 4px solid var(--orange);
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 4px;
            color: var(--text-primary);
        }

        .stat-card .sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ============================================
           ФОРМЫ
           ============================================ */
        .form-section {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            background: var(--bg-card);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 30px;
            align-items: flex-end;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1 0 140px;
        }

        .form-group label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 2px rgba(255,85,0,0.2);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        /* ============================================
           КНОПКИ
           ============================================ */
        .btn {
            background: var(--orange);
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--orange-hover);
            transform: scale(1.02);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--orange);
            color: var(--orange);
        }

        .btn-outline:hover {
            background: var(--orange);
            color: #fff;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }

        .btn-success {
            background: #00a854;
        }

        .btn-success:hover {
            background: #008c46;
        }

        /* ============================================
           ТАБЛИЦЫ
           ============================================ */
        .table-wrap {
            overflow-x: auto;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 4px 0 8px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 700px;
        }

        th {
            text-align: left;
            padding: 16px 12px;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--table-border);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--table-border);
            vertical-align: middle;
            color: var(--text-primary);
        }

        tr:hover td {
            background: var(--table-row-hover);
        }

        .actions-cell button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            margin: 0 4px;
            font-size: 1rem;
            transition: 0.1s;
        }

        .actions-cell button:hover {
            color: var(--orange);
        }

        /* ============================================
           ПОИСК И ФИЛЬТРАЦИЯ
           ============================================ */
        .search-sort {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
            padding: 12px 16px 8px 16px;
            align-items: center;
        }

        .search-sort input,
        .search-sort select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 18px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .search-sort input:focus,
        .search-sort select:focus {
            border-color: var(--orange);
        }

        .search-sort input::placeholder {
            color: var(--text-muted);
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background: var(--filter-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.15s;
        }

        .filter-btn:hover {
            border-color: var(--orange);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--orange);
            border-color: var(--orange);
            color: #fff;
        }

        /* ============================================
           АНАЛИТИКА
           ============================================ */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .analytics-item {
            background: var(--bg-card);
            padding: 14px 16px;
            border-radius: 14px;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
            color: var(--text-primary);
        }

        /* ============================================
           ГРАФИКИ
           ============================================ */
        .chart-container {
            background: var(--chart-bg);
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .chart-container h3 {
            color: var(--text-primary);
        }

        .chart-container canvas {
            width: 100% !important;
            height: auto !important;
            max-height: 300px;
            background: var(--chart-bg);
            border-radius: 12px;
        }

        /* ============================================
           ЦЕЛИ
           ============================================ */
        .goal-progress {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .goal-item {
            flex: 1 0 140px;
            background: var(--goal-bg);
            padding: 12px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.3s ease;
        }

        .goal-item .label {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .goal-item .value {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .goal-item span:last-child {
            color: var(--orange);
            font-weight: 600;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            min-width: 60px;
        }

        .progress-fill {
            height: 100%;
            background: var(--orange);
            border-radius: 12px;
        }

        /* ============================================
           КАРТЫ
           ============================================ */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            margin: 16px 0;
        }

        .map-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .map-card .map-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .map-card .map-stat {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* ============================================
           ПРОФИЛЬ
           ============================================ */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-edit {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 12px;
        }

        .profile-edit input {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-primary);
            font-size: 1rem;
            flex: 1;
        }

        .profile-edit input:focus {
            border-color: var(--orange);
            outline: none;
        }

        .profile-edit input::placeholder {
            color: var(--text-muted);
        }

        /* ============================================
           РЕЙТИНГ
           ============================================ */
        .rank-table {
            margin-top: 20px;
        }

        .rank-table .rank-num {
            font-weight: 700;
            color: var(--orange);
            width: 30px;
            display: inline-block;
        }

        .rank-table .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.15s;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .rank-table .user-item:hover {
            background: var(--rank-hover);
        }

        .rank-table .user-item .user-name {
            flex: 1;
            font-weight: 600;
            color: var(--text-primary);
        }

        .rank-table .user-item .user-stats {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .rank-table .user-item .user-elo {
            color: var(--orange);
            font-weight: 700;
        }

        .rank-medal {
            font-size: 1.5rem;
        }

        .search-user-input {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 20px;
            color: var(--text-primary);
            font-size: 0.9rem;
            width: 100%;
            max-width: 400px;
        }

        .search-user-input:focus {
            border-color: var(--orange);
            outline: none;
        }

        .search-user-input::placeholder {
            color: var(--text-muted);
        }

        /* ============================================
           АДАПТИВНОСТЬ
           ============================================ */
        @media (max-width: 700px) {
            .form-section {
                flex-direction: column;
                align-items: stretch;
            }
            .stat-card .value {
                font-size: 1.5rem;
            }
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .app-header h1 {
                justify-content: center;
            }
            .header-right {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .goal-progress {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                flex-wrap: wrap;
            }
            .search-sort {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <header class="app-header">
            <h1><span>▶</span> FACEIT TRACKER PRO</h1>
            <div class="header-right">
                <div id="currentUser" class="user-display">👤 Игрок</div>
                <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                    🌙 <span id="themeLabel">Тёмная</span>
                </button>
            </div>
        </header>

        <nav class="tab-bar">
            <button class="tab-btn active" data-tab="dashboard">📊 Панель</button>
            <button class="tab-btn" data-tab="matches">📋 Матчи</button>
            <button class="tab-btn" data-tab="analytics">📈 Аналитика</button>
            <button class="tab-btn" data-tab="maps">🗺️ Карты</button>
            <button class="tab-btn" data-tab="goals">🎯 Цели</button>
            <button class="tab-btn" data-tab="profile">👤 Профиль</button>
            <button class="tab-btn" data-tab="ranking">🏆 Рейтинг</button>
        </nav>

        <!-- DASHBOARD -->
        <div id="tab-dashboard">
            <div class="card-grid" id="statsGrid"></div>

            <div class="form-section" id="matchForm">
                <div class="form-group"><label>Дата</label><input type="date" id="matchDate"></div>
                <div class="form-group"><label>Карта</label>
                    <select id="matchMap">
                        <option>Mirage</option><option>Inferno</option><option>Dust2</option>
                        <option>Nuke</option><option>Ancient</option><option>Anubis</option>
                        <option>Cache</option><option>Overpass</option>
                    </select>
                </div>
                <div class="form-group"><label>Счёт</label><input type="text" id="matchScore" placeholder="16-14"></div>
                <div class="form-group"><label>Результат</label>
                    <select id="matchResult"><option value="win">Победа</option><option value="loss">Поражение</option></select>
                </div>
                <div class="form-group"><label>Elo до</label><input type="number" id="matchEloBefore" value="1500"></div>
                <div class="form-group"><label>Elo после</label><input type="number" id="matchEloAfter" value="1525"></div>
                <div class="form-group"><label>Рейтинг</label><input type="number" id="matchRating" step="0.01" value="1.10"></div>
                <div class="form-group"><label>K</label><input type="number" id="matchKills" value="18"></div>
                <div class="form-group"><label>D</label><input type="number" id="matchDeaths" value="15"></div>
                <div class="form-group"><label>A</label><input type="number" id="matchAssists" value="5"></div>
                <div class="form-group"><label>ADR</label><input type="number" id="matchAdr" value="78.5" step="0.1"></div>
                <div class="form-group"><label>KAST %</label><input type="number" id="matchKast" value="72" step="1"></div>
                <div class="form-group"><label>Entry Kills</label><input type="number" id="matchEntry" value="2"></div>
                <div class="form-group"><label>Clutches</label><input type="number" id="matchClutches" value="1"></div>
                <div class="form-group"><label>Роль</label>
                    <select id="matchRole"><option>AWP</option><option>Rifler</option><option>Lurker</option><option>IGL</option><option>Support</option></select>
                </div>
                <div class="form-group"><label>Комментарий</label><input type="text" id="matchComment" placeholder="Кратко"></div>
                <div class="form-group" style="flex:0 0 auto;"><button class="btn" id="saveMatchBtn">➕ Добавить</button></div>
            </div>

            <div class="chart-container">
                <h3>📈 График Elo</h3>
                <canvas id="eloChart"></canvas>
            </div>
        </div>

        <!-- MATCHES -->
        <div id="tab-matches" class="hidden">
            <div class="search-sort">
                <input type="text" id="searchMatches" placeholder="🔍 Поиск по карте, комментарию..." style="flex:2; min-width:180px;">
                <div class="filter-group">
                    <button class="filter-btn active" data-period="all">Все</button>
                    <button class="filter-btn" data-period="day">День</button>
                    <button class="filter-btn" data-period="week">Неделя</button>
                    <button class="filter-btn" data-period="month">Месяц</button>
                    <button class="filter-btn" data-period="year">Год</button>
                    <button class="filter-btn" data-period="last30">Последние 30</button>
                </div>
                <select id="sortMatches">
                    <option value="date-desc">📅 Новые</option>
                    <option value="date-asc">📅 Старые</option>

    <script>
        // ============================================
        // ТЕМА
        // ============================================
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            const btn = document.getElementById('themeToggle');
            const label = document.getElementById('themeLabel');
            if (newTheme === 'light') {
                btn.innerHTML = '☀️ <span id="themeLabel">Светлая</span>';
            } else {
                btn.innerHTML = '🌙 <span id="themeLabel">Тёмная</span>';
            }
        }

        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeToggle');
        const label = document.getElementById('themeLabel');
        if (savedTheme === 'light') {
            btn.innerHTML = '☀️ <span id="themeLabel">Светлая</span>';
        } else {
            btn.innerHTML = '🌙 <span id="themeLabel">Тёмная</span>';
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // ============================================
        // UTILS
        // ============================================
        function formatDate(date) {
            if (!date) return '';
            const d = new Date(date);
            return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function calcKD(kills, deaths) {
            if (!deaths || deaths === 0) return kills || 0;
            return (kills / deaths);
        }

        function safeNumber(value, defaultValue = 0) {
            const num = parseFloat(value);
            return isNaN(num) ? defaultValue : num;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // ============================================
        // DATA
        // ============================================
        const STORAGE_KEYS = {
            MATCHES: 'ft_matches',
            GOALS: 'ft_goals',
            PROFILE: 'ft_profile',
            USERS: 'ft_users'
        };

        let matches = [];
        let goals = { elo: 2000, rating: 1.5, adr: 90, winrate: 60 };
        let profile = { name: 'Игрок' };
        let users = {};

        function loadData() {
            matches = JSON.parse(localStorage.getItem(STORAGE_KEYS.MATCHES)) || [];
            goals = JSON.parse(localStorage.getItem(STORAGE_KEYS.GOALS)) || { elo: 2000, rating: 1.5, adr: 90, winrate: 60 };
            profile = JSON.parse(localStorage.getItem(STORAGE_KEYS.PROFILE)) || { name: 'Игрок' };
            users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS)) || {};

            if (matches.length === 0) {
                generateTestData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEYS.MATCHES, JSON.stringify(matches));
            localStorage.setItem(STORAGE_KEYS.GOALS, JSON.stringify(goals));
            localStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(profile));
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
        }

        function generateTestData() {
            const mapPool = ['Mirage', 'Inferno', 'Dust2', 'Nuke', 'Ancient', 'Anubis', 'Cache', 'Overpass'];
            const roles = ['AWP', 'Rifler', 'Lurker', 'IGL', 'Support'];
            const comments = ['Хороший матч', 'Отлично сыграли', 'Нужно больше тренироваться', 'Командная работа', 'Индивидуальный перфоманс'];
            let elo = 1500;
            const today = new Date();

            for (let i = 0; i < 25; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - (25 - i) * 2);

                const isWin = Math.random() > 0.4;
                const change = Math.floor(Math.random() * 30 + 15);
                const newElo = isWin ? elo + change : elo - change;
                const k = Math.floor(Math.random() * 20 + 10);
                const d = Math.floor(Math.random() * 15 + 8);

                matches.push({
                    id: generateId(),
                    date: date.toISOString().slice(0, 10),
                    map: mapPool[Math.floor(Math.random() * mapPool.length)],
                    score: `${16 - Math.floor(Math.random() * 4)}-${Math.floor(Math.random() * 14 + 10)}`,
                    result: isWin ? 'win' : 'loss',
                    eloBefore: elo,
                    eloAfter: newElo,
                    rating: parseFloat((Math.random() * 0.8 + 0.7).toFixed(2)),
                    kills: k,
                    deaths: d,
                    assists: Math.floor(Math.random() * 8 + 2),
                    adr: parseFloat((Math.random() * 60 + 40).toFixed(1)),
                    kast: Math.floor(Math.random() * 30 + 60),
                    entry: Math.floor(Math.random() * 4),
                    clutches: Math.floor(Math.random() * 3),
                    role: roles[Math.floor(Math.random() * roles.length)],
                    comment: comments[Math.floor(Math.random() * comments.length)]
                });
                elo = newElo;
            }

            saveData();
        }

        function getFilteredMatches(period = 'all') {
            const now = new Date();
            let filtered = [...matches];

            switch (period) {
                case 'day':
                    const today = now.toISOString().slice(0, 10);
                    filtered = filtered.filter(m => m.date === today);
                    break;
                case 'week':
                    const weekAgo = new Date(now);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    filtered = filtered.filter(m => new Date(m.date) >= weekAgo);
                    break;
                case 'month':
                    const monthAgo = new Date(now);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    filtered = filtered.filter(m => new Date(m.date) >= monthAgo);
                    break;
                case 'year':
                    const yearAgo = new Date(now);
                    yearAgo.setFullYear(yearAgo.getFullYear() - 1);
                    filtered = filtered.filter(m => new Date(m.date) >= yearAgo);
                    break;
                case 'last30':
                    filtered = filtered.slice(-30);
                    break;
                default:
                    break;
            }

            return filtered;
        }

        // ============================================
        // STATS
        // ============================================
        function calculateStats(data) {
            const n = data.length;
            if (!n) {
                return {
                    elo: 0,
                    targetElo: goals.elo || 2000,
                    matches: 0,
                    winrate: 0,
                    avgRating: 0,
                    avgAdr: 0,
                    avgKd: 0,
                    winStreak: 0,
                    lossStreak: 0,
                    maxWinStreak: 0,
                    totalWins: 0,
                    totalLosses: 0
                };
            }

            let totalRating = 0;
            let totalAdr = 0;
            let totalKd = 0;
            let wins = 0;
            let eloCurrent = 0;
            let maxWinStreak = 0;
            let lossStreak = 0;
            let lastResult = null;
            let curStreak = 0;

            const last = data[data.length - 1];
            eloCurrent = last.eloAfter || 0;

            data.forEach((m, i) => {
                if (m.result === 'win') wins++;
                totalRating += safeNumber(m.rating);
                totalAdr += safeNumber(m.adr);
                const k = safeNumber(m.kills, 1);
                const d = safeNumber(m.deaths, 1);
                totalKd += (k / d);

                if (i === 0) {
                    curStreak = 1;
                    lastResult = m.result;
                } else {
                    if (m.result === lastResult) {
                        curStreak++;
                    } else {
                        if (lastResult === 'win') {
                            if (curStreak > maxWinStreak) maxWinStreak = curStreak;
                        } else {
                            if (curStreak > lossStreak) lossStreak = curStreak;
                        }
                        curStreak = 1;
                        lastResult = m.result;
                    }
                }
            });

            if (lastResult === 'win') {
                if (curStreak > maxWinStreak) maxWinStreak = curStreak;
            } else {
                if (curStreak > lossStreak) lossStreak = curStreak;
            }

            const winrate = (wins / n * 100);

            return {
                elo: eloCurrent,
                targetElo: goals.elo || 2000,
                matches: n,
                winrate: winrate,
                avgRating: totalRating / n,
                avgAdr: totalAdr / n,
                avgKd: totalKd / n,
                winStreak: lastResult === 'win' ? curStreak : 0,
                lossStreak: lastResult === 'loss' ? curStreak : 0,
                maxWinStreak: maxWinStreak,
                totalWins: wins,
                totalLosses: n - wins
            };
        }

        // ============================================
        // CHARTS
        // ============================================
        function drawLineChart(canvasId, data, label, color = '#FF5500', secondData = null, secondColor = '#FFAA00') {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            const width = Math.min(rect.width - 48, 1200);
            const height = 250;

            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

            const padding = { top: 20, right: 20, bottom: 30, left: 40 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            ctx.clearRect(0, 0, width, height);

            if (!data || data.length < 2) {
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#666';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Недостаточно данных для графика (нужно минимум 2 матча)', width / 2, height / 2);
                return;
            }

            const allData = secondData ? [...data, ...secondData] : data;
            const maxVal = Math.max(...allData, 1);
            const minVal = Math.min(...allData, 0);
            const range = maxVal - minVal || 1;

            const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim() || '#333';
            const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#888';

            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (chartHeight * (1 - i / 4));
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
                ctx.fillStyle = textColor;
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText((minVal + range * i / 4).toFixed(1), padding.left - 5, y + 3);
            }

            function drawLine(dataSet, colorSet, labelSet) {
                if (!dataSet || dataSet.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = colorSet;
                ctx.lineWidth = 2.5;
                for (let i = 0; i < dataSet.length; i++) {
                    const x = padding.left + (i / (dataSet.length - 1)) * chartWidth;
                    const y = padding.top + chartHeight - ((dataSet[i] - minVal) / range) * chartHeight;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                ctx.fillStyle = colorSet;
                for (let i = 0; i < dataSet.length; i++) {
                    const x = padding.left + (i / (dataSet.length - 1)) * chartWidth;
                    const y = padding.top + chartHeight - ((dataSet[i] - minVal) / range) * chartHeight;
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (labelSet) {
                    ctx.fillStyle = colorSet;
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'left';
                    const lastX = padding.left + ((dataSet.length - 1) / (dataSet.length - 1)) * chartWidth;
                    const lastY = padding.top + chartHeight - ((dataSet[dataSet.length - 1] - minVal) / range) * chartHeight;
                    ctx.fillText(labelSet, lastX + 8, lastY + 4);
                }
            }

            drawLine(data, color, label);
            if (secondData) {
                drawLine(secondData, secondColor, 'ADR');
            }

            ctx.fillStyle = textColor;
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(data.length / 10));
            for (let i = 0; i < data.length; i += step) {
                const x = padding.left + (i / (data.length - 1)) * chartWidth;
                ctx.fillText(i + 1, x, height - 5);
            }
        }

        function updateAllCharts() {
            const filtered = getFilteredMatches(currentPeriod || 'all');

            const eloData = filtered.map(m => m.eloAfter || 0);
            drawLineChart('eloChart', eloData, 'Elo');

            const ratingData = filtered.map(m => safeNumber(m.rating));
            const adrData = filtered.map(m => safeNumber(m.adr));
            drawLineChart('ratingAdrChart', ratingData, 'Рейтинг', '#FF5500', adrData, '#FFAA00');

            const winrateData = [];
            for (let i = 0; i < filtered.length; i++) {
                const start = Math.max(0, i - 4);
                const slice = filtered.slice(start, i + 1);
                const winsInSlice = slice.filter(m => m.result === 'win').length;
                winrateData.push((winsInSlice / slice.length) * 100);
            }
            drawLineChart('winrateChart', winrateData, 'Winrate %', '#00CC88');
        }

        // ============================================
        // MATCHES
        // ============================================
        let editingIndex = null;
        let currentPeriod = 'all';

        function saveMatch() {
            const date = document.getElementById('matchDate').value;
            const map = document.getElementById('matchMap').value;
            const score = document.getElementById('matchScore').value;
            const result = document.getElementById('matchResult').value;
            const eloBefore = safeNumber(document.getElementById('matchEloBefore').value);
            const eloAfter = safeNumber(document.getElementById('matchEloAfter').value);
            const rating = safeNumber(document.getElementById('matchRating').value);
            const kills = parseInt(document.getElementById('matchKills').value) || 0;
            const deaths = parseInt(document.getElementById('matchDeaths').value) || 1;
            const assists = parseInt(document.getElementById('matchAssists').value) || 0;
            const adr = safeNumber(document.getElementById('matchAdr').value);
            const kast = parseInt(document.getElementById('matchKast').value) || 0;
            const entry = parseInt(document.getElementById('matchEntry').value) || 0;
            const clutches = parseInt(document.getElementById('matchClutches').value) || 0;
            const role = document.getElementById('matchRole').value;
            const comment = document.getElementById('matchComment').value;

            const matchObj = {
                id: editingIndex !== null ? matches[editingIndex].id : generateId(),
                date,
                map,
                score,
                result,
                eloBefore,
                eloAfter,
                rating,
                kills,
                deaths,
                assists,
                adr,
                kast,
                entry,
                clutches,
                role,
                comment
            };

            if (editingIndex !== null) {
                matches[editingIndex] = matchObj;
                editingIndex = null;
                document.getElementById('saveMatchBtn').textContent = '➕ Добавить';
            } else {
                matches.push(matchObj);
            }

            saveData();
            renderAll();
            document.getElementById('matchEloBefore').value = eloAfter;
            document.getElementById('matchComment').value = '';
        }

        function deleteMatch(index) {
            if (!confirm('Удалить этот матч?')) return;
            matches.splice(index, 1);
            saveData();
            renderAll();
        }

        function editMatch(index) {
            const m = matches[index];
            if (!m) return;
            editingIndex = index;
            document.getElementById('matchDate').value = m.date || '';
            document.getElementById('matchMap').value = m.map || 'Mirage';
            document.getElementById('matchScore').value = m.score || '';
            document.getElementById('matchResult').value = m.result || 'win';
            document.getElementById('matchEloBefore').value = m.eloBefore || 0;
            document.getElementById('matchEloAfter').value = m.eloAfter || 0;
            document.getElementById('matchRating').value = m.rating || 1;
            document.getElementById('matchKills').value = m.kills || 0;
            document.getElementById('matchDeaths').value = m.deaths || 0;
            document.getElementById('matchAssists').value = m.assists || 0;
            document.getElementById('matchAdr').value = m.adr || 0;
            document.getElementById('matchKast').value = m.kast || 0;
            document.getElementById('matchEntry').value = m.entry || 0;
            document.getElementById('matchClutches').value = m.clutches || 0;
            document.getElementById('matchRole').value = m.role || 'AWP';
            document.getElementById('matchComment').value = m.comment || '';
            document.getElementById('saveMatchBtn').textContent = '✏️ Обновить';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderMatchesTable() {
            const tbody = document.getElementById('matchesTableBody');
            const search = document.getElementById('searchMatches').value.toLowerCase();
            const sort = document.getElementById('sortMatches').value;
            let filtered = getFilteredMatches(currentPeriod).filter((m) => {
                const map = (m.map || '').toLowerCase();
                const comment = (m.comment || '').toLowerCase();
                return map.includes(search) || comment.includes(search);
            });

            if (sort === 'date-desc') filtered.sort((a, b) => (a.date || '').localeCompare(b.date || '') * -1);
            else if (sort === 'date-asc') filtered.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
            else if (sort === 'elo') filtered.sort((a, b) => ((b.eloAfter || 0) - (b.eloBefore || 0)) - ((a.eloAfter || 0) - (a.eloBefore || 0)));
            else if (sort === 'rating') filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));

            tbody.innerHTML = filtered.map((m) => {
                const idx = matches.indexOf(m);
                const kd = calcKD(m.kills, m.deaths);
                const delta = (m.eloAfter || 0) - (m.eloBefore || 0);
                return `<tr>
                        <td>${formatDate(m.date)}</td>
                        <td>${m.map || ''}</td>
                        <td><span class="${m.result === 'win' ? 'badge-win' : 'badge-loss'}">${m.result === 'win' ? 'Победа' : 'Поражение'}</span></td>
                        <td>${m.score || ''}</td>
                        <td>${m.rating || 0}</td>
                        <td>${kd.toFixed(2)}</td>
                        <td>${m.adr || 0}</td>
                        <td style="color:${delta >= 0 ? '#4CAF50' : '#f44366'}">${delta > 0 ? '+' : ''}${delta}</td>
                        <td class="actions-cell">
                            <button onclick="editMatch(${idx})">✏️</button>
                            <button onclick="deleteMatch(${idx})">🗑️</button>
                        </td>
                    </tr>`;
            }).join('');
        }

        // ============================================
        // ANALYTICS
        // ============================================
        function renderAnalytics() {
            const n = matches.length;
            if (!n) {
                document.getElementById('analyticsCards').innerHTML = '<div class="analytics-item">Нет данных</div>';
                return;
            }

            let wins = 0,
                totalRating = 0,
                totalAdr = 0,
                totalKast = 0,
                totalKd = 0;
            let mapStats = {},
                roleStats = {};
            let bestMatch = null,
                worstMatch = null;

            matches.forEach((m) => {
                if (m.result === 'win') wins++;
                totalRating += safeNumber(m.rating);
                totalAdr += safeNumber(m.adr);
                totalKast += parseInt(m.kast) || 0;
                const kd = calcKD(m.kills, m.deaths);
                totalKd += kd;

                const map = m.map || 'Unknown';
                if (!mapStats[map]) mapStats[map] = { w: 0, l: 0, rating: 0, adr: 0, kd: 0, count: 0 };
                mapStats[map].count++;
                if (m.result === 'win') mapStats[map].w++;
                else mapStats[map].l++;
                mapStats[map].rating += safeNumber(m.rating);
                mapStats[map].adr += safeNumber(m.adr);
                mapStats[map].kd += kd;

                const role = m.role || 'Other';
                if (!roleStats[role]) roleStats[role] = { w: 0, l: 0, count: 0 };
                roleStats[role].count++;
                if (m.result === 'win') roleStats[role].w++;
                else roleStats[role].l++;

                const r = safeNumber(m.rating);
                if (!bestMatch || r > safeNumber(bestMatch.rating)) bestMatch = m;
                if (!worstMatch || r < safeNumber(worstMatch.rating)) worstMatch = m;
            });

            const avgRating = totalRating / n;
            const avgAdr = totalAdr / n;
            const avgKast = totalKast / n;
            const avgKd = totalKd / n;
            const winrate = wins / n * 100;

            const mapEntries = Object.entries(mapStats).map(([name, st]) => ({
                name,
                w: st.w,
                l: st.l,
                rating: st.rating / st.count,
                adr: st.adr / st.count,
                kd: st.kd / st.count,
                count: st.count
            }));
            const bestMap = mapEntries.sort((a, b) => b.w / b.count - a.w / a.count)[0];
            const worstMap = mapEntries.sort((a, b) => a.w / a.count - b.w / b.count)[0];

            const roleEntries = Object.entries(roleStats).map(([name, st]) => ({
                name,
                winrate: st.w / st.count * 100,
                count: st.count
            }));
            const bestRole = roleEntries.sort((a, b) => b.winrate - a.winrate)[0];
            const worstRole = roleEntries.sort((a, b) => a.winrate - b.winrate)[0];

            document.getElementById('analyticsCards').innerHTML = `
                    <div class="analytics-item"><span class="orange">Ср. рейтинг</span><br><strong>${avgRating.toFixed(2)}</strong></div>
                    <div class="analytics-item"><span class="orange">Ср. ADR</span><br><strong>${avgAdr.toFixed(1)}</strong></div>
                    <div class="analytics-item"><span class="orange">Ср. KAST</span><br><strong>${avgKast.toFixed(1)}%</strong></div>
                    <div class="analytics-item"><span class="orange">Ср. K/D</span><br><strong>${avgKd.toFixed(2)}</strong></div>
                    <div class="analytics-item"><span class="orange">Winrate</span><br><strong>${winrate.toFixed(1)}%</strong></div>
                    <div class="analytics-item"><span class="orange">Лучшая карта</span><br>${bestMap ? bestMap.name + ' (' + (bestMap.w / bestMap.count * 100).toFixed(0) + '%)' : '—'}</div>
                    <div class="analytics-item"><span class="orange">Худшая карта</span><br>${worstMap ? worstMap.name + ' (' + (worstMap.w / worstMap.count * 100).toFixed(0) + '%)' : '—'}</div>
                    <div class="analytics-item"><span class="orange">Лучшая роль</span><br>${bestRole ? bestRole.name + ' (' + bestRole.winrate.toFixed(0) + '%)' : '—'}</div>
                    <div class="analytics-item"><span class="orange">Худшая роль</span><br>${worstRole ? worstRole.name + ' (' + worstRole.winrate.toFixed(0) + '%)' : '—'}</div>
                    <div class="analytics-item"><span class="orange">Самый сильный матч</span><br>${bestMatch ? bestMatch.map + ' ' + bestMatch.rating : '—'}</div>
                    <div class="analytics-item"><span class="orange">Самый слабый матч</span><br>${worstMatch ? worstMatch.map + ' ' + worstMatch.rating : '—'}</div>
                `;
        }

        // ============================================
        // PROFILE
        // ============================================
        function renderProfile() {
            const s = calculateStats(matches);
            document.getElementById('profileMatches').textContent = s.matches;
            document.getElementById('profileWinrate').textContent = s.winrate.toFixed(1) + '%';
            document.getElementById('profileRating').textContent = s.avgRating.toFixed(2);
            document.getElementById('profileAdr').textContent = s.avgAdr.toFixed(1);
            document.getElementById('profileKd').textContent = s.avgKd.toFixed(2);
            document.getElementById('profileElo').textContent = Math.round(s.elo);

            const roles = {};
            matches.forEach(m => {
                const r = m.role || 'Other';
                roles[r] = (roles[r] || 0) + 1;
            });
            const topRole = Object.entries(roles).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('profileRole').textContent = 'Основная роль: ' + (topRole ? topRole[0] : '—');

            const mapCount = {};
            matches.forEach(m => {
                const map = m.map || 'Unknown';
                mapCount[map] = (mapCount[map] || 0) + 1;
            });
            const topMaps = Object.entries(mapCount).sort((a, b) => b[1] - a[1]).slice(0, 2).map(e => e[0]).join(', ');
            document.getElementById('profileMaps').textContent = 'Любимые карты: ' + (topMaps || '—');

            document.getElementById('profileNameInput').value = profile.name || 'Игрок';
            document.getElementById('currentUser').textContent = '👤 ' + (profile.name || 'Игрок');
        }

        function saveProfileName() {
            const name = document.getElementById('profileNameInput').value.trim();
            if (name) {
                profile.name = name;
                saveData();
                renderProfile();
            }
        }

        // ============================================
        // RANKING
        // ============================================
        function renderRanking() {
            const search = document.getElementById('searchUser').value.toLowerCase();
            const container = document.getElementById('rankTable');

            const allUsers = {};

            allUsers[profile.name] = {
                name: profile.name,
                matches: matches.length,
                elo: matches.length > 0 ? matches[matches.length - 1].eloAfter || 0 : 0,
                winrate: matches.length > 0 ? (matches.filter(m => m.result === 'win').length / matches.length * 100) : 0,
                avgRating: matches.length > 0 ? matches.reduce((s, m) => s + safeNumber(m.rating), 0) / matches.length : 0
            };

            Object.values(users).forEach(user => {
                if (user.name && user.name !== profile.name) {
                    allUsers[user.name] = user;
                }
            });

            let sorted = Object.values(allUsers)
                .filter(u => u.name.toLowerCase().includes(search))
                .sort((a, b) => b.elo - a.elo);

            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">👀 Пользователей не найдено</div>';
                return;
            }

            container.innerHTML = sorted.map((user, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
                const isCurrentUser = user.name === profile.name;
                return `
                        <div class="user-item" style="${isCurrentUser ? 'border:2px solid var(--orange);' : ''}">
                            <span class="rank-num">${medal}</span>
                            <span class="user-name">${user.name} ${isCurrentUser ? '⭐' : ''}</span>
                            <span class="user-stats">${user.matches} матчей</span>
                            <span class="user-stats">${user.winrate.toFixed(1)}% WR</span>
                            <span class="user-stats">Рейтинг: ${user.avgRating.toFixed(2)}</span>
                            <span class="user-elo">${Math.round(user.elo)} Elo</span>
                        </div>
                    `;
            }).join('');
        }

        function addUserToRanking() {
            const userData = {
                name: profile.name,
                matches: matches.length,
                elo: matches.length > 0 ? matches[matches.length - 1].eloAfter || 0 : 0,
                winrate: matches.length > 0 ? (matches.filter(m => m.result === 'win').length / matches.length * 100) : 0,
                avgRating: matches.length > 0 ? matches.reduce((s, m) => s + safeNumber(m.rating), 0) / matches.length : 0
            };
            users[profile.name] = userData;
            saveData();
        }

        // ============================================
        // RENDER ALL
        // ============================================
        function renderStats() {
            const filtered = getFilteredMatches(currentPeriod);
            const s = calculateStats(filtered);
            const progress = s.targetElo > s.elo ? (s.elo / s.targetElo * 100) : 100;

            document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="label">Elo</div><div class="value">${Math.round(s.elo)}</div><div class="sub">Цель: ${s.targetElo}</div></div>
                    <div class="stat-card"><div class="label">Прогресс</div><div class="value">${Math.min(100, Math.round(progress))}%</div><div class="sub">до цели</div></div>
                    <div class="stat-card"><div class="label">Матчи</div><div class="value">${s.matches}</div></div>
                    <div class="stat-card"><div class="label">Winrate</div><div class="value">${s.winrate.toFixed(1)}%</div></div>
                    <div class="stat-card"><div class="label">Ср. рейтинг</div><div class="value">${s.avgRating.toFixed(2)}</div></div>
                    <div class="stat-card"><div class="label">Ср. ADR</div><div class="value">${s.avgAdr.toFixed(1)}</div></div>
                    <div class="stat-card"><div class="label">Ср. K/D</div><div class="value">${s.avgKd.toFixed(2)}</div></div>
                    <div class="stat-card"><div class="label">Серия побед</div><div class="value">${s.winStreak}</div><div class="sub">Макс: ${s.maxWinStreak}</div></div>
                    <div class="stat-card"><div class="label">Серия поражений</div><div class="value">${s.lossStreak}</div></div>
                `;
        }

        function renderGoals() {
            const s = calculateStats(matches);
            const container = document.getElementById('goalProgressContainer');
            const g = goals;

            const progressElo = g.elo > 0 ? Math.min(100, (s.elo / g.elo) * 100) : 0;
            const progressRating = g.rating > 0 ? Math.min(100, (s.avgRating / g.rating) * 100) : 0;
            const progressAdr = g.adr > 0 ? Math.min(100, (s.avgAdr / g.adr) * 100) : 0;
            const progressWinrate = g.winrate > 0 ? Math.min(100, (s.winrate / g.winrate) * 100) : 0;

            container.innerHTML = `
                    <div class="goal-item"><span class="label">Elo</span><span class="value">${Math.round(s.elo)}/${g.elo}</span><div class="progress-bar"><div class="progress-fill" style="width:${progressElo}%"></div></div><span>${Math.round(progressElo)}%</span></div>
                    <div class="goal-item"><span class="label">Рейтинг</span><span class="value">${s.avgRating.toFixed(2)}/${g.rating}</span><div class="progress-bar"><div class="progress-fill" style="width:${progressRating}%"></div></div><span>${Math.round(progressRating)}%</span></div>
                    <div class="goal-item"><span class="label">ADR</span><span class="value">${s.avgAdr.toFixed(1)}/${g.adr}</span><div class="progress-bar"><div class="progress-fill" style="width:${progressAdr}%"></div></div><span>${Math.round(progressAdr)}%</span></div>
                    <div class="goal-item"><span class="label">Winrate</span><span class="value">${s.winrate.toFixed(1)}%/${g.winrate}%</span><div class="progress-bar"><div class="progress-fill" style="width:${progressWinrate}%"></div></div><span>${Math.round(progressWinrate)}%</span></div>
                `;
        }

        function renderMaps() {
            const mapNames = ['Mirage', 'Inferno', 'Dust2', 'Nuke', 'Ancient', 'Anubis', 'Cache', 'Overpass'];
            const grid = document.getElementById('mapGrid');

            grid.innerHTML = mapNames.map(name => {
                const ms = matches.filter(m => (m.map || '').toLowerCase() === name.toLowerCase());
                const n = ms.length;
                if (!n) return `<div class="map-card"><div class="map-name">${name}</div><div class="map-stat">Нет матчей</div></div>`;

                const wins = ms.filter(m => m.result === 'win').length;
                const winrate = wins / n * 100;
                const avgRating = ms.reduce((s, m) => s + safeNumber(m.rating), 0) / n;
                const avgAdr = ms.reduce((s, m) => s + safeNumber(m.adr), 0) / n;
                const kd = ms.reduce((s, m) => s + calcKD(m.kills, m.deaths), 0) / n;

                return `<div class="map-card">
                        <div class="map-name">${name}</div>
                        <div class="map-stat">Матчей: ${n}</div>
                        <div class="map-stat">Winrate: ${winrate.toFixed(0)}%</div>
                        <div class="map-stat">Рейтинг: ${avgRating.toFixed(2)}</div>
                        <div class="map-stat">ADR: ${avgAdr.toFixed(1)}</div>
                        <div class="map-stat">K/D: ${kd.toFixed(2)}</div>
                    </div>`;
            }).join('');
        }

        function renderAll() {
            renderStats();
            renderMatchesTable();
            renderAnalytics();
            renderMaps();
            renderGoals();
            renderProfile();
            renderRanking();
            updateAllCharts();
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================

        loadData();

        document.getElementById('matchDate').value = new Date().toISOString().slice(0, 10);

        document.getElementById('goalElo').value = goals.elo || 2000;
        document.getElementById('goalRating').value = goals.rating || 1.5;
        document.getElementById('goalAdr').value = goals.adr || 90;
        document.getElementById('goalWinrate').value = goals.winrate || 60;

        // ============================================
        // СОБЫТИЯ
        // ============================================

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
                document.getElementById('tab-' + tab).classList.remove('hidden');
                setTimeout(() => renderAll(), 50);
            });
        });

        document.getElementById('saveMatchBtn').addEventListener('click', saveMatch);

        document.getElementById('searchMatches').addEventListener('input', renderMatchesTable);
        document.getElementById('sortMatches').addEventListener('change', renderMatchesTable);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = this.dataset.period;
                renderAll();
            });
        });

        document.getElementById('exportJsonBtn').addEventListener('click', function() {
            const blob = new Blob([JSON.stringify(matches, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'matches.json';
            a.click();
        });

        document.getElementById('exportCsvBtn').addEventListener('click', function() {
            if (!matches.length) return;
            const headers = ['date', 'map', 'score', 'result', 'eloBefore', 'eloAfter', 'rating', 'kills', 'deaths', 'assists', 'adr', 'kast', 'entry', 'clutches', 'role', 'comment'];
            let csv = headers.join(',') + '\n';
            matches.forEach(m => {
                csv += headers.map(h => (m[h] || '')).join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'matches.csv';
            a.click();
        });

        document.getElementById('importBtn').addEventListener('click', function() {
            document.getElementById('importFileInput').click();
        });
        document.getElementById('importFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data)) {
                        matches = data;
                        saveData();
                        renderAll();
                        alert('✅ Импорт выполнен успешно!');
                    }
                } catch (err) {
                    alert('❌ Ошибка импорта');
                }
            };
            reader.readAsText(file);
            this.value = '';
        });

        document.getElementById('setGoalsBtn').addEventListener('click', function() {
            goals.elo = safeNumber(document.getElementById('goalElo').value, 2000);
            goals.rating = safeNumber(document.getElementById('goalRating').value, 1.5);
            goals.adr = safeNumber(document.getElementById('goalAdr').value, 90);
            goals.winrate = safeNumber(document.getElementById('goalWinrate').value, 60);
            saveData();
            renderAll();
        });

        document.getElementById('saveProfileName').addEventListener('click', saveProfileName);
        document.getElementById('profileNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') saveProfileName();
        });

        document.getElementById('searchUser').addEventListener('input', debounce(renderRanking, 300));

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => updateAllCharts(), 200);
        });

        renderAll();

        setInterval(() => {
            if (matches.length > 0) {
                addUserToRanking();
            }
        }, 30000);
    </script>
</body>
</html>
